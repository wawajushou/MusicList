name: 每日直播歌单推送

on:
  schedule:
    # 北京时间 20:00 = UTC 12:00
    - cron: '0 12 * * *'

  # 允许手动触发（用于测试）
  workflow_dispatch:

jobs:
  push-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 爬取今日榜单数据
        run: python main.py --crawl

      - name: 生成歌单并推送
        run: python push.py

      - name: 提交更新的数据
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: 更新每日榜单数据"
          git push
